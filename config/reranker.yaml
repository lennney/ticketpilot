# Hybrid Reranker Configuration
# Weights must sum to 1.0

weights:
  rrf_score: 0.40
  embedding_similarity: 0.25
  intent_metadata_boost: 0.20
  content_quality: 0.15

# Intent -> doc_type boost values
# Higher value = stronger preference for that doc_type given the intent
intent_boost:
  refund:
    policy: 0.15
    faq: 0.10
  return_exchange:
    policy: 0.15
    faq: 0.10
  account_issue:
    policy: 0.10
    faq: 0.10
  technical_issue:
    faq: 0.10
    case: 0.10
  product_consulting:
    faq: 0.15
  logistics:
    faq: 0.10
    case: 0.10
  complaint:
    case: 0.15
    policy: 0.10
  other: {}

content_quality:
  optimal_length_min: 200
  optimal_length_max: 800
  keyword_density_weight: 0.5

num_query_variants: 2
