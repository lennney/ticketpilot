services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ticketpilot-postgres
    environment:
      POSTGRES_USER: ticketpilot
      POSTGRES_PASSWORD: ticketpilot
      POSTGRES_DB: ticketpilot
    ports:
      - "5432:5432"
    volumes:
      - ticketpilot_pgdata:/var/lib/postgresql/data
      - ./db/seed:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketpilot -d ticketpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ticketpilot_pgdata:
